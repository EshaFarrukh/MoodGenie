name: Flutter CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  firebase-rules:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install Firebase rules test dependencies
        working-directory: firebase_tests
        run: npm install

      - name: Run Firebase rules tests
        working-directory: firebase_tests
        run: npm test

  backend-quality:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install backend dependencies
        working-directory: backend
        run: npm install

      - name: Backend tests
        working-directory: backend
        run: npm test

      - name: Backend audit
        working-directory: backend
        run: npm run audit:prod

  android-quality:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Install dependencies
        run: flutter pub get

      - name: Analyze
        run: flutter analyze --no-fatal-infos

      - name: Test
        run: flutter test

      - name: Android release build
        run: flutter build apk --release

      - name: Android artifact size budget
        run: ./scripts/check_artifact_sizes.sh android

  admin-build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install admin dependencies
        working-directory: apps/admin
        run: npm install

      - name: Test admin app
        working-directory: apps/admin
        run: npm test

      - name: Build admin app
        working-directory: apps/admin
        run: npm run build

  ios-build:
    runs-on: macos-14

    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Install dependencies
        run: flutter pub get

      - name: Install CocoaPods
        run: |
          cd ios
          pod install

      - name: iOS no-codesign build
        run: flutter build ios --no-codesign

      - name: iOS artifact size budget
        run: ./scripts/check_artifact_sizes.sh ios
